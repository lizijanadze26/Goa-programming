<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gradient Button</title>


<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=keyboard_arrow_right" />

<style>
body {
    background-color: #1e1b4b;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Button */
.btn {
    width: 150px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px 70px;
    border-radius: 50px;
     font-size: 20px;
    color: white;
    text-decoration: none;

    background: linear-gradient(90deg, #ff2d7a, #ff9a5c);
    

    
}
.material-symbols-outlined {
    position: absolute;
    right: 15px;
   margin-left: 20px;
   font-size: 45px;
}

</style>
</head>

<body>

<a href="#" class="btn">
    <p>READ MORE</p>
    <span class="material-symbols-outlined">keyboard_arrow_right</span>
</a>

</body>
</html>
