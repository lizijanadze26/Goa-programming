<!--3.პირობა: შექმენი პროგრამა  რომელიც ამოწმებს ამინდის მდგომარეობას ტემპერატურის მიხედვით: 30 C და მეტი  -"ძალიან ცხელა ,ფრთხილად იყავით"  20C დან 29C მდე -"კარგი ამინდია" 10C  დან 19C მდე - "ცივა თბილად  ჩაიცვი" 10C  ზე ნაკლები - "ძალიან ცივა სახლში დარჩი "-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>

        let temperature = 15;
        if (temperature >= 30) {
            console.log("ძალიან ცხელა ,ფრთხილად იყავით")
        } else if (temperature >= 20 && temperature <= 29) {
            console.log("კარგი ამინდია")
        } else if (temperature >= 10 && temperature <= 19) {
            console.log("ცივა თბილად  ჩაიცვი")
        } else {
            console.log("ძალიან ცივა სახლში დარჩი ")
        }
    </script>
    
</body>
</html>
