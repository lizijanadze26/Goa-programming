<!--4) HTML-ში შექმენი სამი პარაგრაფი. inline CSS-ში: პირველ პარაგრაფს font-size 16px მეორე პარაგრაფს font-size 20px მესამე პარაგრაფს font-size 24px ყველა ტექსტს ჰქონდეს font-family Times New Roman.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="hw4.css">
</head>
<body>
    <p style="font-size: 16px; font-family: 'Times New Roman', Times, serif;">1 paragraph</p>
    <p style="font-size: 20px; font-family: 'Times New Roman', Times, serif;" >2 paragraph</p>
    <p style="font-size: 24px; font-family: 'Times New Roman', Times, serif;">3 paragraph</p>
</body>
</html>
