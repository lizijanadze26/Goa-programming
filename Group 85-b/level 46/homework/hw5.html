<!--5) შექმენი HTML გვერდი ერთი სათაურით და ერთი პარაგრაფით. CSS-ში: სათაურის color იყოს orange პარაგრაფის color იყოს gray პარაგრაფის font-size იყოს 19px.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color: orange;
        }
        p{
            color: gray;
            font-size: 19px;
        }
    </style>
    
</head>
<body>
    <h1>satauri</h1>
    <p>paragraph</p>
</body>
</html>
