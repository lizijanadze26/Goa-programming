
<!--გამოიყენეთ transform თვისება და გადააადგილეთ ელემენტი საწყისი პოზიციიდან მარჯვნივ $100px$-ით და ქვემოთ $50px$-ით.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: red;
            transform: translate(100px, 50px);
        }

    </style>
</head>
<body>
    <div></div>
</body>
</html>
