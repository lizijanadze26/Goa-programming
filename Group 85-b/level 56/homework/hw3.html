<!--გაზარდეთ ელემენტის ზომა $1.5$-ჯერ (ორივე განზომილებაში) transform თვისების გამოყენებით.-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: red;
            transform: scale(1.5);
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
