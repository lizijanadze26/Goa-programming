<!--ერთ ხაზში დაწერეთ კოდი, რომელიც ელემენტს 50px-ით გასწევს Y ღერძზე, გააორმაგებს მის ზომას და Z ღერძის გარშემო 90 გრადუსით დაატრიალებს.-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: red;
            transform: translateY(50px) scale(2) rotateZ(90deg);
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
