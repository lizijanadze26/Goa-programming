<!--დაატრიალეთ ელემენტი rotate3d()-ით 45 გრადუსზე ერთდროულად X და Y ღერძების მიმართ (ვექტორი: 1, 1, 0).-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: red;
            transform: rotate3d(1, 1, 0, 45deg);
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
