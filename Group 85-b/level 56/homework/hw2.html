<!--rotate3d() ფუნქციის გამოყენებით, ამოატრიალეთ ელემენტი $180$ გრადუსით ისე, რომ ის თავდაყირა დადგეს (გამოიყენეთ xyz ღერძი).-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div {
            width: 100px;
            height: 100px;
            
            background-color: red;
            transform: rotate3d(1, 1, 1, 180deg);
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
