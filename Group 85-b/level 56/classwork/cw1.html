<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: blue;
            transition: transform 0.5s;
        }
        .box:hover {
            transform: translate(200px, 200px);
        }
    </style>
</head>
<body>
    <div class="box"></div>
