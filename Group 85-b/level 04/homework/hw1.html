<!--1)ახსენით რას ნიშნავს tag.
tag არის html ის თგი რომელიც განსაზღვრავს როგორ გამოჩნდება ტექსტი ან ელემენტი ვებ გვერდზე-->
<!--2)ახსენით რას ნიშნავს container tag. არის თეგი რომელსაც დამხურავი და გამხსნელი თეგი აქვს მაგალითად p tag-->
<!--3)ახსენით რას ნიშნავს empty tag.  არის თგო რომელსაც მხოლოდ გამხსნელი თეგი აქვს მაგალითდ img tag -->
<!--4)ახსენით რას ნიშნავს atribute. განსაზღვრავს დამატებით დეტალებს მაგალითად a tag ში href განსაზღვრავს -->
<!--5)ჩამოწერეთ ყველა ნასწავლი tag. a tag img tag p tag button tag h1-h6 tag br tag ul li ol -->
<!--6)ახსენით რა არის სია და რისთვის ვიყნებეთ მას. სია არის ელემენტების ნაკრები რომელიც ვებგვერდზე არის ჩამოწერილი  და ვიყენებთ ნივთების ჩამონათვალისთის-->
<!--7)რა განსხვავება არის დალაგებულ სიასა და დაულაგებელ სიას შორის. დალაგებული სია არის ol  და ის ლაგდება ნომრებით, დაულაგებელი სია არის ul და ის ლაგდება წერტილებით -->
<!--8)შექმენი დალაგებული სია, სადაც შეინახავთ კომპიუტერის ნაწილების სიას და შემდეგ შექმენით დაულაგებელი სია, სადაც შეინახავთ სახლის პროდუქტების სიას.-->

<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

        <li>CPU</li>

        <li>PSU</li>

        <li>STORAGE</li>
    </ol>
    <ul>
        <li>bread</li>
        <li>milk</li>
        <li>apple</li>
        <li>cheese</li>
    </ul>
</body>
</html>
