<!--2) ჩამოთვალე სამი სია და რა განსხვავება არის თითოეულში? დალაგებული სია Ordered List<ol> (1,2,3,4 , ABC )   დაულაგებელი სია Unordered List ამასჩამონათვალი წერტილებით აქვს-->
<!--3) ახსენი სამივე სია. დალაგებული სია – როდესაც საჭიროებს კონკრეტულ რიგს. დაულაგებელი სია – როდესაც ელემენტები უბრალოდ ჩამონათვალში უნდა იყოს, რიგი არ არის მნიშვნელოვანი.აღწერილობითი სია – დეტალურად აღწერს თითოეულ ელემენტს-->
<!--4) რა არის type ატრიბუტი  type ატრიბუტი განსაზღვრავს დალაგებული სიის ნუმერაციის ტიპს.-->
<!--5) შექმენით HTML document, მასში დაამატეთ: heading - ები, paragraph - ები, button - ები და ასევე დაამატეთ დალაგებული სია, 
დაამატეთ 3 დალაგებული სია პირველი იყოს რიცხვების ჩამონათვალი, მე - 2 იყოს ABC ანბანის მიხედვით და მე - 3 იყოს I(რომაული დამწერლობა).-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h5>hello world</h5>
    <h4>hello</h4>
    <p>paragraph</p>
    <button>click here</button>
    <ol>
        <li>apple</li>
        <li>banana</li>
    </ol>
    <ol type="A">
        <li>burgers</li>
        <li>fries</li>
    </ol>
    <ol type="I">
        <li>drinks</li>
        <li>juice</li>
    </ol>
    
</body>
</html>
