<!--1) ახსენი რა არის form tags. form tag არის HTML თეგი, რომელიც გამოიყენება მომხმარებლის შეყვანილი ინფორმაციის შესაგროვებლად, მაგალითად, ფორმულებში, სადაც უნდა შევქმნათ საკუთარი ფორმები.-->
<!--2) ახსენი რა არის label tags. label tag არის HTML თეგი, რომელიც გამოიყენება ფორმის ველების დასახელების მისათვის.-->
<!--3) ახსენი რა არის attribute და რამდენი სახის არის ასევე ახსენით თითოეული. ატრიბუტი არის HTML თეგებში მონაცემების დამატების საშუალება, რომელიც განსაზღვრავს თეგის თვისებებს. მაგალითად, class, id, src, alt, style.-->
<!--4) ახსენი რა არის for attribute. for attribute არის HTML თეგის ატრიბუტი რომელიც გამოიყენება label tag-ისთვის, რომ დაუკავშირდეს ფორმის ველთან.-->
<!--5) ახსენი რა არის type attribute. type attribute არის HTML თეგის ატრიბუტი რომელიც განსაზღვრავს ფორმის ველის ტიპს მაგალითად, text, email, password.-->
<!--6) ახსენი რა არის name attribute. name attribute არის HTML თეგის ატრიბუტი რომელიც განსაზღვრავს ფორმის ველის სახელს რომელიც გამოიყენება მონაცემების შეგროვებისას.-->
<!--7) ახსენი რა არის id attribute. id attribute არის HTML თეგის ატრიბუტი რომელიც განსაზღვრავს თეგის უნიკალურ იდენტიფიკატორს, რომელიც გამოიყენება CSS-ში და JavaScript-ში.-->
<!--8) ახსენი რა არის placeholder attribute. placeholder attribute არის HTML თეგის ატრიბუტი რომელიც გამოიყენება ფორმის ველში მონაცემების შეყვანისას, რომ დაუხადოს მომხმარებელს, თუ რით უნდა შეიყვანოს.-->
<!--9) ახსენი რა არის value attribute. value attribute არის HTML თეგის ატრიბუტი რომელიც განსაზღვრავს ფორმის ველის მნიშვნელობას, რომელიც გამოიყენება მონაცემების შეგროვებისას.-->
<!--10) ახსენიი რა არის required. required ატრიბუტი არის HTML თეგის ატრიბუტი, რომელიც განსაზღვრავს, თუ ფორმის ველი აუცილებელია შევსებული იყოს, მაგალითად, input tag-ში.-->
<!--11) ახსენი რა არის br tags. br tag არის HTML თეგი, რომელიც გამოიყენება სტრიქონების გამოყოფისთვის, მაგალითად, ხაზის შეცვლაში.-->
