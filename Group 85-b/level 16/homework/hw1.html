<!--1) ახსენით რა არის ცხრილი. ცხრილი არის HTML ელემენტი, რომელიც გამოიყენება ცხრილის შესაქმნელად. -->
<!--2) ახსენით რა არის table. ის არის HTML ელემენტი, რომელიც გამოიყენება ცხრილის შესაქმნელად. ის შედგენილია ხაზების (tr) და უჯრედების (td)გამოყენებით.-->
<!--3) ახსენით რა არის thead. ის არის HTML ელემენტი, რომელიც გამოიყენება ცხრილის სათაურის (header) შესაქმნელად.-->
<!--4) ახსენით რა არის tr. ის არის HTML ელემენტი, რომელიც გამოიყენება ცხრილის ხაზის შესაქმნელად.-->
<!--5) ახსენით რა არის th. ის არის HTML ელემენტი, რომელიც გამოიყენება ცხრილის უჯრედის  შესაქმნელად, თუმცა უპირატესობას მიუთითებს სათაურის (header) შესაქმნელად.-->
<!--6) ახსენით რა არის tbody.  მაში ვწერთ ცხრილის მონაცემებს ცხრილის მთავარი მონაცემებია tr td-->
<!--7) ახსენით რა არის td. გამოიყენება ცხრილის უჯრედების შესაქმნელად.-->
<!--8) შექმენით ცხრიი და დაამატეთ თამაშის ოლიმპიადის შედეგები.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <tr>
            <th>თამაშის სახელი</th>
            <th>მონაწილეთა რაოდენობა</th>
            <th>ოქროს მედლები</th>
            <th>ვერცხლის მედლები</th>
            <th>ბრინჯაოს მედლები</th>
        </tr>
        <tr>
            <td>100 მეტრი სირბილი</td>
            <td>8</td>
            <td>1</td>
            <td>1</td>
            <td>1</td>
        </tr>
        <tr>
            <td>200 მეტრი სირბილი</td>
            <td>8</td>
            <td>1</td>
            <td>1</td>
            <td>1</td>
        </tr>
</body>
</html>
