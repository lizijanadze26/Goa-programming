<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--flexbox არის css სისტემა რომელიც გამოყენება რომ ელემენტები დავალაგოთ ერთხაზზე ან სვეტად-->
    <!--როცა მშობელ ელემენტს ვუწერთ flex ს მისი შვილ ელემენტები ერთ ხაზზე განლაგდება-->
    <!--justify-content: center,ელემენტები თავსდება ცენტრში.  justify-content: space-between,ელემენტებს შორის აკეთბს თანაბარ დასჰორებას.   justify-content: space-around,
    ელემენტებს შორის აკეთებს თანაბარ დაშორებას და კონტეინერის კიდეებთნ ნახევარს. justify-content: space-evenly ელემენტებს შორის და კიდეებთან აკეთებს თანაბარ დაშორებას-->
<!--flex-start ელემენტებს ალაგებს მარცხნიდან მარჯვნივ დასაწყიში,   center კი ელემენტებს ალაგებს ცენტრში -->
<!--space-between ელემენტებს შორის აკეთებს თანაბარ დაშორებას, space-around ყველა ელემენტს შორის აკეთბს თნაბარ დაშორებას და კიდეებთნ ნახევარს აკეტბს-->
<!--align-items ელემენტებს ალაგებს ვერტიკალურად-->
<!--flex-start ელემენტებს ალაგებს ზემოთ ოღონდ ვერტიკალურად
flex-end ელემენტებს ალაგებს ქვემოთ და ვერტიკალურად
center ელემენტებს ალაგებს ბცენტრში-->
<!--flex-wrap განსაზღვრავს გადავლენ თუარა ელემენტები ახალ ხაზე
no-wrap არ გადადის ახალ ხაზზე
wrap გადადის ახალ ხაზზე და გამოიყენება მაშინ როცა ელემენტები კონტეინერშ აღრ ეტევა-->
<!--main axis flexboxში განისაზღვრება flex-direction თვისებით და შეიძლება გრძელდებოდეს ჰორიზონტალურად ან ვერტიკალურად-->
<!--cross axis არის main axis ის საპირისპირო -->
<!--flex-direction განსაზღვრავს რა მიმართულებით განლაგდეს flex ელემენტები-->
<!--flex-direction:row ელემენტები განლაგდება მარცხნიდან მარჯვნივ-->
<!--flex-direction:column ელემენტები განლაგდება ზემოდან ქვემოთ-->
<!--flex-end თ ელემენტებს გადავიტანთ  მარჯვნიდან ბოლოში-->
<!--flex-start ით-->
</body>
</html>
